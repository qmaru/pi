name: container

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pi

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag $IMAGE:latest \
            --push \
            .

      - name: Verify image
        run: |
          docker buildx imagetools inspect $IMAGE:latest
