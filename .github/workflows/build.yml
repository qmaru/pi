name: container

on:
  push:
    paths-ignore:
      - "compose.yaml"
      - ".gitignore"
      - ".env.example"
      - "README.md"
      - "examples/**"
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent/pi

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push base
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=pi
          cache-to: type=gha,scope=pi,mode=max
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          context: .
          platforms: linux/amd64,linux/arm64
          target: pi-base
          tags: |
            ${{ env.IMAGE }}:base
          push: true


      - name: Build and push latest
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=pi
          cache-to: type=gha,scope=pi,mode=max
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          context: .
          platforms: linux/amd64,linux/arm64
          target: pi-full
          tags: |
            ${{ env.IMAGE }}:latest
          push: true

      - name: Verify image
        run: |
          docker buildx imagetools inspect $IMAGE:base
          docker buildx imagetools inspect $IMAGE:latest
